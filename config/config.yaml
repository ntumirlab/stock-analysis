# 全域環境變數 (敏感資訊請設定在 .env 檔案)
env:
  FINLAB_API_TOKEN: "${FINLAB_API_TOKEN}"
  GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
  GOOGLE_TOKEN_PATH: "${GOOGLE_TOKEN_PATH}"

# LLM 配置
llm_settings:
  model_name: "gemini-2.0-flash"
  api_rate_limit_sleep: 30
  max_retries: 3
  prompt_file_path: "./config/prompts/golden_ai_parsing_prompt.txt"

# Telegram 通知 
notification:
  enabled: true
  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

users:
  junting:
    shioaji:
      env:
        SHIOAJI_API_KEY: "${SHIOAJI_API_KEY}"
        SHIOAJI_SECRET_KEY: "${SHIOAJI_SECRET_KEY}"
        SHIOAJI_CERT_PERSON_ID: "${SHIOAJI_CERT_PERSON_ID}"
        SHIOAJI_CERT_PATH: "${SHIOAJI_CERT_PATH}"
        SHIOAJI_CERT_PASSWORD: "${SHIOAJI_CERT_PASSWORD}"
      constant:
        rebalance_safety_weight: 0.3
        strategy_class_name: "AlanTWStrategyACE"
    fugle:
      env:
        FUGLE_CONFIG_PATH: "${FUGLE_CONFIG_PATH}"
        FUGLE_MARKET_API_KEY: "${FUGLE_MARKET_API_KEY}"
        FUGLE_ACCOUNT: "${FUGLE_ACCOUNT}"
        FUGLE_ACCOUNT_PASSWORD: "${FUGLE_ACCOUNT_PASSWORD}"
        FUGLE_CERT_PASSWORD: "${FUGLE_CERT_PASSWORD}"
      constant:
        rebalance_safety_weight: 0.3
        strategy_class_name: "AlanTWStrategyACE"

recommendation_tasks:
  weekly:
    drive_folder_id: "${WEEKLY_DRIVE_FOLDER_ID}"
    local_dir: "./assets/recommendations_w"
  
  monthly:
    drive_folder_id: "${MONTHLY_DRIVE_FOLDER_ID}"
    local_dir: "./assets/recommendations_m"

# Roger 策略專用參數
roger:
  weekly:
    buy_weekday: 1         # 買入日：週一 ~ 週五 (1-5)
    sell_weekday: 5        # 賣出日：週一 ~ 週五 (1-5)
    max_stocks: 4          # 最大持股數
    stop_loss: null        # 停損比例，若不用則設為 null
    take_profit: null      # 停利比例，若不用則設為 null
    trade_at_price: 'open_close_mix'  # 成交價

  monthly:
    buy_weekday: 1         # 買入日：週一 ~ 週五 (1-5)
    sell_weekday: 5        # 賣出日：週一 ~ 週五 (1-5)
    max_stocks: 4          # 最大持股數
    stop_loss: null        # 停損比例，若不用則設為 null
    take_profit: null      # 停利比例，若不用則設為 null
    trade_at_price: 'open_close_mix'  # 成交價

# Oscar 策略專用參數
oscar:
  general:
    preprocess_start_date: null
    preprocess_lookback_days: 252
    prefilter_enabled: false
    prefilter_min_avg_volume_30: 1000000
    prefilter_min_history_days: 120
    sim_fast_mode: false
    volume_above_avg_ratio: 0.25
    min_avg_volume_30: 1000000
    max_volume_spike_ratio: 10.0
    new_high_ratio_120: 0.3
  andor:
    # no config now
  composite:
    signal_quantile_bins: null
    signal_weights:
      sar: 0.35
      macd: 0.35
      volume: 0.15
      institutional: 0.15
    buy_score_threshold: 0.86
    sell_score_threshold: 0.4
    sar_event_decay_alpha: 1.8
    sar_proximity_weight: 0.4
    sar_event_weight: 1.0
    macd_event_decay_alpha: 1.8
    macd_proximity_weight: 0.4
    macd_event_weight: 1.0
  