# 全域環境變數 (敏感資訊請設定在 .env 檔案)
env:
  FINLAB_API_TOKEN: "${FINLAB_API_TOKEN}"
  GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
  GOOGLE_TOKEN_PATH: "${GOOGLE_TOKEN_PATH}"

# LLM 配置
llm_settings:
  model_name: "gemini-2.0-flash"
  api_rate_limit_sleep: 30
  max_retries: 3
  prompt_file_path: "./config/prompts/golden_ai_parsing_prompt.txt"

# Telegram 通知 
notification:
  enabled: true
  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

users:
  junting:
    shioaji:
      env:
        SHIOAJI_API_KEY: "${SHIOAJI_API_KEY}"
        SHIOAJI_SECRET_KEY: "${SHIOAJI_SECRET_KEY}"
        SHIOAJI_CERT_PERSON_ID: "${SHIOAJI_CERT_PERSON_ID}"
        SHIOAJI_CERT_PATH: "${SHIOAJI_CERT_PATH}"
        SHIOAJI_CERT_PASSWORD: "${SHIOAJI_CERT_PASSWORD}"
      constant:
        rebalance_safety_weight: 0.3
        strategy_class_name: "AlanTWStrategyACE"
    fugle:
      env:
        FUGLE_CONFIG_PATH: "${FUGLE_CONFIG_PATH}"
        FUGLE_MARKET_API_KEY: "${FUGLE_MARKET_API_KEY}"
        FUGLE_ACCOUNT: "${FUGLE_ACCOUNT}"
        FUGLE_ACCOUNT_PASSWORD: "${FUGLE_ACCOUNT_PASSWORD}"
        FUGLE_CERT_PASSWORD: "${FUGLE_CERT_PASSWORD}"
      constant:
        rebalance_safety_weight: 0.3
        strategy_class_name: "AlanTWStrategyACE"

recommendation_tasks:
  weekly:
    drive_folder_id: "${WEEKLY_DRIVE_FOLDER_ID}"
    local_dir: "./assets/recommendations_w"
  
  monthly:
    drive_folder_id: "${MONTHLY_DRIVE_FOLDER_ID}"
    local_dir: "./assets/recommendations_m"

# Roger 策略專用參數
roger:
  weekly:
    buy_weekday: 1         # 買入日：週一 ~ 週五 (1-5)
    sell_weekday: 5        # 賣出日：週一 ~ 週五 (1-5)
    max_stocks: 5          # 最大持股數
    use_db_sl: false       # 是否使用資料庫中的停損價格，若為 false 則不使用停損
    global_sl: null        # 全域停損比例，若不用則設為 null
    use_db_tp: false       # 是否使用資料庫中的停利價格，若為 false 則不使用停利
    global_tp: null        # 全域停利比例，若不用則設為 null
    trade_at_price: 'open_close_mix'  # 成交價
    lookback_months: 3     # 回測期間：幾個月

  monthly:
    buy_weekday: 1         # 買入日：週一 ~ 週五 (1-5)
    sell_weekday: 5        # 賣出日：週一 ~ 週五 (1-5)
    max_stocks: 5          # 最大持股數
    use_db_sl: false       # 是否使用資料庫中的停損價格，若為 false 則不使用停損
    global_sl: null        # 全域停損比例，若不用則設為 null
    use_db_tp: false       # 是否使用資料庫中的停利價格，若為 false 則不使用停利
    global_tp: null        # 全域停利比例，若不用則設為 null
    trade_at_price: 'open_close_mix'  # 成交價
    lookback_months: 3     # 回測期間：幾個月

# Oscar 策略專用參數
oscar:
  general:
    volume_above_avg_ratio: 0.25
    min_avg_volume_30: 1000000
    max_volume_spike_ratio: 10.0
    new_high_ratio_120: 0.3
  andor:
    sim_fast_mode: false
    preprocess_start_date: null
    preprocess_lookback_days: 252
    prefilter_enabled: false
    prefilter_min_avg_volume_30: 1000000
    prefilter_min_history_days: 120
  composite:
    sar_params:
      acceleration: 0.045
      maximum: 0.21
    macd_params:
      fastperiod: 8
      slowperiod: 13
      signalperiod: 5
    sar_signal_lag_max: 0
    macd_signal_lag_max: 0
    signal_quantile_bins:
      sar: 10
      macd: 100
      volume: 50
      institutional: null
    signal_weights:
      sar: 0.45
      macd: 0.33
      volume: 0.11
      institutional: 0.11
    buy_score_threshold: 0.86
    sell_score_threshold: 0.79
    # SAR signal fusion: event proximity (lag-decay) vs. current-bar event
    sar_event_decay_alpha: 1.8
    sar_proximity_weight: 1.3
    sar_event_weight: 2.0
    sar_near_sigmoid_slope: 3.0
    sar_near_distance_scale: 0.045
    sar_event_sigmoid_slope: 10.5
    sar_event_distance_scale: 0.08
    sar_history_lookback: 1
    sar_history_decay_alpha: 3.4
    # MACD signal fusion: DIF-DEA zero-closeness vs. golden-cross event proximity (lag-decay)
    macd_event_decay_alpha: 1.8
    macd_proximity_weight: 1.7
    macd_event_weight: 0.1
    macd_near_sigmoid_slope: 13.5
    macd_near_distance_scale: 2.25
    macd_event_sigmoid_slope: 5.0
    macd_event_distance_scale: 2.3
    macd_history_lookback: 8
    macd_history_decay_alpha: 1.7