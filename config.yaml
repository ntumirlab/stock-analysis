# 全域環境變數 (敏感資訊請設定在 .env 檔案)
env:
  FINLAB_API_TOKEN: "${FINLAB_API_TOKEN}"
  GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
  GOOGLE_TOKEN_PATH: "${GOOGLE_TOKEN_PATH}"

# LLM 配置
llm_settings:
  model_name: "gemini-2.0-flash"
  api_rate_limit_sleep: 30
  max_retries: 3
  prompt_file_path: "./config/prompts/golden_ai_parsing_prompt.txt"

# Telegram 通知 
notification:
  enabled: true
  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

users:
  junting:
    shioaji:
      env:
        SHIOAJI_API_KEY: "${SHIOAJI_API_KEY}"
        SHIOAJI_SECRET_KEY: "${SHIOAJI_SECRET_KEY}"
        SHIOAJI_CERT_PERSON_ID: "${SHIOAJI_CERT_PERSON_ID}"
        SHIOAJI_CERT_PATH: "${SHIOAJI_CERT_PATH}"
        SHIOAJI_CERT_PASSWORD: "${SHIOAJI_CERT_PASSWORD}"
      constant:
        rebalance_safety_weight: 0.3
        strategy_class_name: "AlanTWStrategyACE"
    fugle:
      env:
        FUGLE_CONFIG_PATH: "${FUGLE_CONFIG_PATH}"
        FUGLE_MARKET_API_KEY: "${FUGLE_MARKET_API_KEY}"
        FUGLE_ACCOUNT: "${FUGLE_ACCOUNT}"
        FUGLE_ACCOUNT_PASSWORD: "${FUGLE_ACCOUNT_PASSWORD}"
        FUGLE_CERT_PASSWORD: "${FUGLE_CERT_PASSWORD}"
      constant:
        rebalance_safety_weight: 0.3
        strategy_class_name: "AlanTWStrategyACE"

recommendation_tasks:
  weekly:
    drive_folder_id: "${WEEKLY_DRIVE_FOLDER_ID}"
    local_dir: "./assets/recommendations_w"
  
  monthly:
    drive_folder_id: "${MONTHLY_DRIVE_FOLDER_ID}"
    local_dir: "./assets/recommendations_m"

# Roger 策略專用參數
roger:
  weekly:
    buy_weekday: 1         # 買入日：週一 ~ 週五 (1-5)
    sell_weekday: 5        # 賣出日：週一 ~ 週五 (1-5)
    max_stocks: 5          # 最大持股數
    use_db_sl: false       # 是否使用資料庫中的停損價格，若為 false 則不使用停損
    global_sl: null        # 全域停損比例，若不用則設為 null
    use_db_tp: false       # 是否使用資料庫中的停利價格，若為 false 則不使用停利
    global_tp: null        # 全域停利比例，若不用則設為 null
    trade_at_price: 'open_close_mix'  # 成交價
    lookback_months: 3     # 回測期間：幾個月

  monthly:
    buy_weekday: 1         # 買入日：週一 ~ 週五 (1-5)
    sell_weekday: 5        # 賣出日：週一 ~ 週五 (1-5)
    max_stocks: 5          # 最大持股數
    use_db_sl: false       # 是否使用資料庫中的停損價格，若為 false 則不使用停損
    global_sl: null        # 全域停損比例，若不用則設為 null
    use_db_tp: false       # 是否使用資料庫中的停利價格，若為 false 則不使用停利
    global_tp: null        # 全域停利比例，若不用則設為 null
    trade_at_price: 'open_close_mix'  # 成交價
    lookback_months: 3     # 回測期間：幾個月

# Oscar 策略專用參數
oscar:
  general:
    volume_above_avg_ratio: 0.25
    min_avg_volume_30: 1000000
    max_volume_spike_ratio: 10.0
    new_high_ratio_120: 0.3
  andor:
    sar_params:
      acceleration: 0.035
      maximum: 0.13
    macd_params:
      fastperiod: 17
      slowperiod: 39
      signalperiod: 7
    volume_above_avg_ratio: 0.9
    new_high_ratio_120: 0.4
    min_avg_volume_30: 5000000
    max_volume_spike_ratio: 4.0
    sar_signal_lag_max: 0
    macd_signal_lag_max: 1
    max_stocks: 5
  composite:
    sar_params:
      acceleration: 0.05
      maximum: 0.25
    macd_params:
      fastperiod: 11
      slowperiod: 21
      signalperiod: 10
    volume_above_avg_ratio: 0.25
    min_avg_volume_30: 3750000
    new_high_ratio_120: 0.65
    max_volume_spike_ratio: 10.5
    sar_signal_lag_max: 8
    macd_signal_lag_max: 5
    signal_quantile_bins:
      sar: 200
      macd: 500
      volume: 50
      institutional: 2
    signal_weights:
      sar: 0.25
      macd: 0.55
      volume: 0.05
      institutional: 0.1
    buy_score_threshold: 0.87
    sell_score_threshold: 0.55
    # SAR signal fusion: event proximity (lag-decay) vs. current-bar event
    sar_event_decay_alpha: 3.3
    sar_proximity_weight: 1.5
    sar_event_weight: 1.4
    sar_near_sigmoid_slope: 14.5
    sar_near_distance_scale: 0.01
    sar_event_sigmoid_slope: 16.5
    sar_event_distance_scale: 0.08
    sar_history_lookback: 9
    sar_history_decay_alpha: 1.3
    # MACD signal fusion: DIF-DEA zero-closeness vs. golden-cross event proximity (lag-decay)
    macd_event_decay_alpha: 2.1
    macd_proximity_weight: 0.9
    macd_event_weight: 0.2
    macd_near_sigmoid_slope: 2.0
    macd_near_distance_scale: 2.15
    macd_event_sigmoid_slope: 9.0
    macd_event_distance_scale: 1.4
    macd_history_lookback: 7
    macd_history_decay_alpha: 1.55

# 2560 策略專用參數
_2560:
  andor:
    ma25_slope_lookback: 3
    pullback_tolerance: 0.02
    small_candle_threshold: 0.02
    deviation_threshold: 0.15
    surge_lookback: 5
    surge_pct: 0.08
    high_lookback: 20
    stop_loss_pct: 0.07
    take_profit_pct: 0.125
    max_positions: 15
    market_ma_period: 60
    pullback_no_new_low_days: 2
    pullback_away_pct: 0.08